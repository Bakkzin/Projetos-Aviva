<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviva Projetos — Costa do Sauípe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F1E3;
    --panel:#FFFFFF;
    --panel-2:#F0E7D2;
    --line:#E3D6B8;
    --line-soft:#ECE1C6;
    --text:#20352E;
    --text-dim:#61705F;
    --text-faint:#93A08E;
    --amber:#DC8F35;
    --amber-dim:#FBEACB;
    --teal:#1E7A63;
    --teal-dim:#DCEFE6;
    --blue:#3E7CA6;
    --blue-dim:#E1EDF4;
    --red:#BF5A49;
    --red-dim:#F6E2DC;
    --steel: linear-gradient(135deg,#2A9678,#154F3E);
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--amber);color:#241706;}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:center;gap:14px;
    padding:14px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#FFFDF7,#F9F1DE);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:.2px;}
  .brand .rail{
    width:28px;height:28px;border-radius:50%;
    background:var(--steel);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;flex-shrink:0;
  }
  .brand .rail::before{content:"";position:absolute;left:-30%;right:-30%;bottom:-40%;height:70%;
    border-radius:50%;background:rgba(255,255,255,.35);}
  .brand .wordmark{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--teal);letter-spacing:.2px;}
  .brand .wordmark em{font-style:normal;font-weight:500;color:var(--text-dim);font-size:14px;margin-left:4px;}
  .crumbs{color:var(--text-dim);font-size:13px;display:flex;align-items:center;gap:6px;}
  .crumbs .cur{color:var(--text);font-weight:600;}
  .crumbs .sep{color:var(--text-faint);}
  .crumbs button{background:none;border:none;color:var(--text-dim);font-size:13px;padding:4px 6px;border-radius:6px;}
  .crumbs button:hover{background:var(--panel-2);color:var(--text);}
  .topbar .spacer{flex:1;}
  .pill-status{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;letter-spacing:.3px;}
  .banner{
    background:var(--amber-dim);color:var(--amber);border-bottom:1px solid #EAC98C;
    font-size:12.5px;padding:8px 22px;display:flex;gap:10px;align-items:center;
  }
  .banner code{background:#000a;padding:1px 6px;border-radius:4px;font-size:11.5px;}
  .banner.hide{display:none;}

  /* ---------- layout ---------- */
  .wrap{max-width:1280px;margin:0 auto;padding:26px 22px 80px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
  .page-head h1{font-size:22px;margin:0 0 4px;}
  .page-head p{margin:0;color:var(--text-dim);font-size:13px;}
  .btn{
    border:1px solid var(--line);background:var(--panel-2);color:var(--text);
    padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;transition:.15s;
  }
  .btn:hover{border-color:#D3C29A;background:#F2E9D2;}
  .btn.primary{background:var(--amber);border-color:var(--amber);color:#2A1B08;}
  .btn.primary:hover{background:#E7A24D;}
  .btn.ghost{background:transparent;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}

  /* project cards */
  .grid-projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .card-project{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 18px 16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;
  }
  .card-project:hover{border-color:#CDBA8E;transform:translateY(-1px);}
  .card-project::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);}
  .card-project.crit::before{background:var(--red);}
  .card-project.warn::before{background:var(--amber);}
  .card-code{font-size:11px;color:var(--text-faint);}
  .card-project h3{font-size:16px;margin:2px 0 6px;}
  .card-project .desc{color:var(--text-dim);font-size:12.5px;line-height:1.5;margin-bottom:14px;min-height:36px;}
  .tags{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .tag{font-size:10.5px;padding:2.5px 8px;border-radius:99px;font-weight:600;border:1px solid transparent;}
  .tag.ok{background:var(--teal-dim);color:var(--teal);}
  .tag.warn{background:var(--amber-dim);color:var(--amber);}
  .tag.crit{background:var(--red-dim);color:var(--red);}
  .tag.info{background:var(--blue-dim);color:var(--blue);}
  .tag.mut{background:var(--panel-2);color:var(--text-dim);border-color:var(--line);}
  .bar-track{height:6px;border-radius:99px;background:var(--panel-2);overflow:hidden;position:relative;}
  .bar-fill{height:100%;background:var(--teal);border-radius:99px;}
  .bar-fill.warn{background:var(--amber);}
  .bar-fill.crit{background:var(--red);}
  .card-project .meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11.5px;color:var(--text-dim);}
  .empty-card{
    border:1.5px dashed var(--line);border-radius:var(--radius);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    padding:30px;color:var(--text-dim);cursor:pointer;min-height:150px;
  }
  .empty-card:hover{border-color:var(--amber);color:var(--amber);}
  .empty-card .plus{font-size:26px;line-height:1;font-family:'Fraunces';}

  /* ---------- project shell / tabs ---------- */
  .proj-head{margin-bottom:16px;}
  .proj-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .proj-title-row h1{margin:0;font-size:20px;}
  .proj-desc{color:var(--text-dim);font-size:13px;margin:6px 0 12px;max-width:760px;}
  .proj-progress{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .proj-progress .bar-track{flex:1;height:8px;}
  .proj-progress .pct{font-family:'JetBrains Mono';font-size:13px;color:var(--text-dim);min-width:38px;text-align:right;}

  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
  .tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;background:none;border-top:none;border-left:none;border-right:none;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--amber);border-bottom-color:var(--amber);}

  /* ---------- overview ---------- */
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px;}
  @media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;}
  .kpi .num{font-family:'Fraunces';font-size:22px;font-weight:700;}
  .kpi .lbl{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .kpi.crit .num{color:var(--red);}
  .kpi.warn .num{color:var(--amber);}
  .kpi.ok .num{color:var(--teal);}

  .panels{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;}
  @media(max-width:900px){.panels{grid-template-columns:1fr;}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .panel h4{margin:0 0 14px;font-size:13px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .sched-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px;}
  .sched-row .k{color:var(--text-dim);}
  .sched-row .v{font-family:'JetBrains Mono';}
  .deviation-note{margin-top:12px;padding:9px 12px;border-radius:8px;font-size:12.5px;font-weight:600;}
  .deviation-note.ok{background:var(--teal-dim);color:var(--teal);}
  .deviation-note.warn{background:var(--amber-dim);color:var(--amber);}
  .deviation-note.crit{background:var(--red-dim);color:var(--red);}
  .status-dist{display:flex;flex-direction:column;gap:9px;}
  .status-dist .row{display:flex;align-items:center;gap:9px;font-size:12.5px;}
  .status-dist .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .status-dist .row .name{flex:1;color:var(--text-dim);}
  .status-dist .row .val{font-family:'JetBrains Mono';}

  /* ---------- list view ---------- */
  .list-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
  .search{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;flex:1;min-width:180px;}
  .search:focus{outline:none;border-color:var(--amber);}
  select.filter{background:var(--panel);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:8px;font-size:12.5px;}

  .table-wrap{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);}
  .row-fase{background:var(--panel-2);font-family:'Fraunces';font-weight:600;font-size:13px;padding:10px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);cursor:pointer;}
  .row-fase:first-child{border-top:none;}
  .row-fase .chev{transition:.15s;color:var(--text-dim);}
  .row-fase.collapsed .chev{transform:rotate(-90deg);}
  .row-fase .bar-track{width:110px;height:5px;}
  .row-etapa{background:#EFE5CC;font-size:12.5px;color:var(--text-dim);font-weight:600;padding:8px 14px 8px 30px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line-soft);cursor:pointer;}
  .row-etapa .chev{transition:.15s;font-size:11px;}
  .row-etapa.collapsed .chev{transform:rotate(-90deg);}
  .row-etapa .bar-track{width:80px;height:4px;}
  .row-atv{
    display:grid;grid-template-columns:22px 1fr 90px 100px 110px 96px;
    gap:10px;align-items:center;padding:9px 14px 9px 46px;border-top:1px solid var(--line-soft);font-size:12.8px;
  }
  .row-atv.done .nome{color:var(--text-faint);text-decoration:line-through;}
  .row-atv .nome{cursor:pointer;}
  .row-atv .nome b{font-weight:600;color:var(--text);}
  .row-atv .sub{display:block;color:var(--text-faint);font-size:11px;margin-top:2px;font-weight:400;text-decoration:none;}
  .chk{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;}
  .dep-chip{font-family:'JetBrains Mono';font-size:10.5px;color:var(--text-dim);background:var(--panel-2);padding:1px 6px;border-radius:5px;}
  .status-select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:11px;padding:4px 6px;border-radius:6px;width:100%;}
  .dev-cell{font-family:'JetBrains Mono';font-size:11.5px;text-align:right;}
  .dev-cell.crit{color:var(--red);}
  .dev-cell.ok{color:var(--teal);}
  .row-atv .dates{font-family:'JetBrains Mono';font-size:11px;color:var(--text-dim);}
  .col-head{display:grid;grid-template-columns:22px 1fr 90px 100px 110px 96px;gap:10px;padding:9px 14px 9px 46px;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);}

  /* ---------- board view ---------- */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
  @media(max-width:900px){.board{grid-template-columns:1fr 1fr;}}
  @media(max-width:560px){.board{grid-template-columns:1fr;}}
  .board-col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:80px;}
  .board-col h4{margin:0 0 10px;font-size:12.5px;display:flex;justify-content:space-between;color:var(--text-dim);}
  .board-col h4 .n{background:var(--panel-2);padding:1px 8px;border-radius:99px;font-family:'JetBrains Mono';}
  .board-card{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:9px;}
  .board-card .fase-lbl{font-size:10px;color:var(--text-faint);margin-bottom:4px;}
  .board-card .nome{font-size:12.8px;font-weight:600;margin-bottom:8px;line-height:1.4;}
  .board-card .foot{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .avatar{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';flex-shrink:0;}

  /* ---------- timeline view ---------- */
  .tl-wrap{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);overflow:hidden;}
  .tl-scroll{overflow-x:auto;}
  .tl-grid{position:relative;min-width:820px;}
  .tl-header{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel-2);}
  .tl-month{flex:1;padding:8px 6px;font-size:10.5px;color:var(--text-dim);text-align:center;border-right:1px solid var(--line-soft);font-family:'JetBrains Mono';}
  .tl-row{display:flex;align-items:center;border-top:1px solid var(--line-soft);position:relative;height:34px;}
  .tl-label{width:230px;flex-shrink:0;font-size:11.5px;padding:0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;left:0;background:var(--panel);z-index:2;border-right:1px solid var(--line);}
  .tl-row.fase .tl-label{font-weight:700;font-family:'Fraunces';font-size:12px;}
  .tl-track{flex:1;position:relative;height:100%;}
  .tl-bar{position:absolute;top:9px;height:16px;border-radius:5px;background:var(--blue);min-width:4px;}
  .tl-bar.fase{background:var(--steel);border:1px solid #154F3E;top:7px;height:20px;}
  .tl-bar .fill{position:absolute;left:0;top:0;bottom:0;background:var(--teal);border-radius:5px 0 0 5px;}
  .tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:3;}
  .tl-today::after{content:"HOJE";position:absolute;top:-2px;left:4px;font-size:9px;color:var(--amber);font-family:'JetBrains Mono';white-space:nowrap;}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.hide{display:none;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 16px;font-size:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
  .field input,.field textarea,.field select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;
    padding:9px 10px;color:var(--text);font-size:13px;font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:60px;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--amber);}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
  .empty-state .big{font-size:32px;margin-bottom:10px;}

  .readonly-badge{font-size:11px;background:var(--panel-2);color:var(--text-dim);padding:3px 9px;border-radius:99px;border:1px solid var(--line);}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="rail"></span><span class="wordmark">aviva<em>projetos</em></span></div>
  <div class="crumbs" id="crumbs"></div>
  <div class="spacer"></div>
  <span id="readonlyBadge" class="readonly-badge" style="display:none;">Modo leitura</span>
</div>
<div class="banner" id="configBanner">
  ⚠ Este planner está rodando em <b>modo local</b> — os dados não são salvos ao recarregar a página.
  Configure a URL do Google Apps Script em <code>CONFIG.SCRIPT_URL</code> no arquivo <code>index.html</code> para persistir tudo numa planilha do Google Sheets (veja o README).
</div>

<div class="wrap" id="app"></div>

<!-- Modal: novo projeto -->
<div class="overlay hide" id="modalProjeto">
  <div class="modal">
    <h3>Novo projeto</h3>
    <div class="field"><label>Nome do projeto</label><input id="npNome" placeholder="Ex: Reforma do restaurante X"></div>
    <div class="field"><label>Descrição</label><textarea id="npDesc" placeholder="Objetivo do projeto em uma frase"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Setor</label><input id="npSetor" placeholder="Ex: Operações CX"></div>
      <div class="field"><label>Prioridade</label>
        <select id="npPrioridade"><option>Alta</option><option selected>Média</option><option>Baixa</option></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Início planejado</label><input id="npInicio" type="date"></div>
      <div class="field"><label>Término planejado</label><input id="npFim" type="date"></div>
    </div>
    <div class="field"><label>Responsável</label><input id="npResp" placeholder="Nome do responsável"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('modalProjeto')">Cancelar</button>
      <button class="btn primary" onclick="submitNovoProjeto()">Criar projeto</button>
    </div>
  </div>
</div>

<!-- Modal: nova atividade -->
<div class="overlay hide" id="modalAtividade">
  <div class="modal">
    <h3>Nova atividade</h3>
    <div class="field"><label>Fase</label><input id="naFase" placeholder="Ex: Fase 1 - Pré-implantação"></div>
    <div class="field"><label>Etapa</label><input id="naEtapa" placeholder="Ex: 1.1 Diagnóstico"></div>
    <div class="field"><label>Nome da atividade</label><input id="naNome" placeholder="Ação clara e executável"></div>
    <div class="field"><label>Descrição prática</label><textarea id="naDesc"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Duração (dias)</label><input id="naDuracao" type="number" step="0.5" value="1"></div>
      <div class="field"><label>Início planejado</label><input id="naInicio" type="date"></div>
    </div>
    <div class="field"><label>Resultado esperado</label><input id="naResultado" placeholder="Entregável claro"></div>
    <div class="field"><label>Responsável</label><input id="naResp" placeholder="Nome do responsável"></div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('modalAtividade')">Cancelar</button>
      <button class="btn primary" onclick="submitNovaAtividade()">Adicionar</button>
    </div>
  </div>
</div>

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(iso){ if(!iso) return '—'; const plain = String(iso).slice(0,10); const d = new Date(plain+'T00:00:00'); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
// A planilha às vezes devolve datas como "2026-06-18T03:00:00.000Z" (célula de data do Sheets)
// em vez de "2026-06-18" puro. Normaliza tudo para "YYYY-MM-DD" assim que os dados chegam.
function normalizeDateFields(obj, fields){
  fields.forEach(f=>{ if(obj[f]) obj[f] = String(obj[f]).slice(0,10); });
  return obj;
}

/* ======================= PERSISTENCE ======================= */
async function loadData(){
  if(CONFIG.SCRIPT_URL){
    try{
      const res = await fetch(CONFIG.SCRIPT_URL + '?action=all');
      const json = await res.json();
      STATE.projects = (json.projects || []).map(p=>normalizeDateFields(p, ['inicioPlan','fimPlan','criadoEm']));
      STATE.tasks = (json.tasks || []).map(t=>normalizeDateFields(t, ['inicioPlan','fimPlan','fimReal']));
      document.getElementById('configBanner').classList.add('hide');
    }catch(e){
      console.error('Falha ao carregar do Google Sheets, usando dados locais.', e);
      STATE.projects = JSON.parse(JSON.stringify(SEED.projects));
      STATE.tasks = JSON.parse(JSON.stringify(SEED.tasks));
    }
  } else {
    STATE.projects = JSON.parse(JSON.stringify(SEED.projects));
    STATE.tasks = JSON.parse(JSON.stringify(SEED.tasks));
  }
  if(STATE.readOnly){
    document.getElementById('readonlyBadge').style.display = 'inline-block';
  }
  render();
}

async function persist(action, payload){
  if(!CONFIG.SCRIPT_URL) return; // modo local: nada a sincronizar
  try{
    await fetch(CONFIG.SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action, payload})
    });
  }catch(e){ console.error('Falha ao sincronizar com o Google Sheets', e); }
}

/* ======================= COMPUTED METRICS ======================= */
function projectTasks(pid){ return STATE.tasks.filter(t=>t.projectId===pid); }

function taskIsOverdue(t){
  return t.status !== 'Concluída' && t.fimPlan < todayISO();
}
function taskDeviationDays(t){
  if(t.status === 'Concluída'){
    const realFim = t.fimReal || t.fimPlan;
    return daysBetween(t.fimPlan, realFim);
  }
  if(taskIsOverdue(t)) return daysBetween(t.fimPlan, todayISO());
  return 0;
}

function computeProjectMetrics(pid){
  const tasks = projectTasks(pid);
  const totalDur = tasks.reduce((s,t)=>s+Number(t.duracao||0),0) || 1;
  const doneDur = tasks.filter(t=>t.status==='Concluída').reduce((s,t)=>s+Number(t.duracao||0),0);
  const progresso = Math.round((doneDur/totalDur)*100);
  const concluidas = tasks.filter(t=>t.status==='Concluída').length;
  const andamento = tasks.filter(t=>t.status==='Em andamento').length;
  const bloqueadas = tasks.filter(t=>t.status==='Bloqueada').length;
  const atrasadas = tasks.filter(taskIsOverdue).length;
  const naoIniciado = tasks.filter(t=>t.status==='Não iniciado').length;
  const inicioPlan = tasks.length? tasks.reduce((m,t)=>t.inicioPlan<m?t.inicioPlan:m, tasks[0].inicioPlan): null;
  const fimPlan = tasks.length? tasks.reduce((m,t)=>t.fimPlan>m?t.fimPlan:m, tasks[0].fimPlan): null;
  let health = 'ok';
  if(atrasadas>3 || bloqueadas>0) health='crit';
  else if(atrasadas>0) health='warn';
  return {tasks,totalDur,progresso,concluidas,andamento,bloqueadas,atrasadas,naoIniciado,total:tasks.length,inicioPlan,fimPlan,health};
}

}

/* ======================= RENDER: OVERVIEW ======================= */
function renderOverview(p,m){
  const hoje = todayISO();
  const durTotal = m.inicioPlan && m.fimPlan ? daysBetween(m.inicioPlan,m.fimPlan) : 0;
  const decorrido = m.inicioPlan ? Math.min(Math.max(daysBetween(m.inicioPlan,hoje),0), durTotal) : 0;
  const pctDecorrido = durTotal ? Math.round((decorrido/durTotal)*100) : 0;
  const desvioDias = m.fimPlan ? daysBetween(m.fimPlan, hoje) : 0; // >0 significa hoje já passou do fim planejado
  let devNote, devClass;
  if(m.progresso>=100){ devNote = 'Projeto concluído.'; devClass='ok'; }
  else if(pctDecorrido - m.progresso > 15){ devNote = `Projeto ${pctDecorrido-m.progresso}% atrás do cronograma.`; devClass='crit'; }
  else if(pctDecorrido - m.progresso > 5){ devNote = `Projeto levemente atrás do cronograma (${pctDecorrido-m.progresso}%).`; devClass='warn'; }
  else if(m.progresso - pctDecorrido > 5){ devNote = `Projeto ${m.progresso-pctDecorrido}% à frente do cronograma.`; devClass='ok'; }
  else { devNote = 'Projeto dentro do cronograma previsto.'; devClass='ok'; }

  const distRows = ['Não iniciado','Em andamento','Concluída','Bloqueada'].map(s=>{
    const n = m.tasks.filter(t=>t.status===s).length;
    return `<div class="row"><span class="dot" style="background:${STATUS_DOT[s]}"></span><span class="name">${s}</span><span class="val">${n}</span></div>`;
  }).join('');

  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="num">${m.progresso}%</div><div class="lbl">Progresso do projeto</div></div>
    <div class="kpi ok"><div class="num">${m.concluidas}/${m.total}</div><div class="lbl">Tarefas concluídas</div></div>
    <div class="kpi ${m.atrasadas?'crit':''}"><div class="num">${m.atrasadas}</div><div class="lbl">Tarefas atrasadas</div></div>
    <div class="kpi"><div class="num">${m.andamento}</div><div class="lbl">Em andamento</div></div>
    <div class="kpi ${m.bloqueadas?'crit':''}"><div class="num">${m.bloqueadas}</div><div class="lbl">Bloqueadas</div></div>
    <div class="kpi"><div class="num">${m.naoIniciado}</div><div class="lbl">Não iniciadas</div></div>
  </div>
  <div class="panels">
    <div class="panel">
      <h4>Cronograma</h4>
      <div class="sched-row"><span class="k">Início planejado</span><span class="v">${fmtDate(m.inicioPlan)}</span></div>
      <div class="sched-row"><span class="k">Término planejado</span><span class="v">${fmtDate(m.fimPlan)}</span></div>
      <div class="sched-row"><span class="k">Duração total</span><span class="v">${durTotal} dias</span></div>
      <div class="sched-row"><span class="k">Tempo decorrido</span><span class="v">${pctDecorrido}%</span></div>
      <div class="bar-track" style="margin-bottom:10px;"><div class="bar-fill" style="width:${pctDecorrido}%;background:var(--text-faint)"></div></div>
      <div class="sched-row"><span class="k">Progresso real</span><span class="v">${m.progresso}%</span></div>
      <div class="bar-track"><div class="bar-fill ${devClass==='crit'?'crit':devClass==='warn'?'warn':''}" style="width:${m.progresso}%"></div></div>
      <div class="deviation-note ${devClass}">${devNote}</div>
    </div>
    <div class="panel">
      <h4>Distribuição por status</h4>
      <div class="status-dist">${distRows}</div>
      <h4 style="margin-top:20px;">Informações</h4>
      <div class="sched-row"><span class="k">Responsável</span><span class="v">${escapeHtml(p.responsavel||'—')}</span></div>
      <div class="sched-row"><span class="k">Setor</span><span class="v">${escapeHtml(p.setor||'—')}</span></div>
      <div class="sched-row"><span class="k">Prioridade</span><span class="v">${escapeHtml(p.prioridade||'—')}</span></div>
    </div>
  </div>`;
}

/* ======================= RENDER: LIST ======================= */
function renderList(p,m){
  let tasks = m.tasks.slice();
  if(STATE.listSearch){
    const q = STATE.listSearch.toLowerCase();
    tasks = tasks.filter(t=> t.nome.toLowerCase().includes(q) || t.etapa.toLowerCase().includes(q));
  }
  if(STATE.listStatusFilter!=='all'){
    tasks = tasks.filter(t=>t.status===STATE.listStatusFilter);
  }
  // group by fase > etapa preserving original order
  const fases = [];
  tasks.forEach(t=>{
    let f = fases.find(f=>f.nome===t.fase);
    if(!f){ f = {nome:t.fase, etapas:[]}; fases.push(f); }
    let e = f.etapas.find(e=>e.nome===t.etapa);
    if(!e){ e = {nome:t.etapa, tasks:[]}; f.etapas.push(e); }
    e.tasks.push(t);
  });

  const body = fases.map(f=>{
    const fTasks = f.etapas.flatMap(e=>e.tasks);
    const fDur = fTasks.reduce((s,t)=>s+Number(t.duracao),0)||1;
    const fDone = fTasks.filter(t=>t.status==='Concluída').reduce((s,t)=>s+Number(t.duracao),0);
    const fPct = Math.round(fDone/fDur*100);
    const fCollapsed = STATE.collapsedFases.has(f.nome);
    const etapasHtml = fCollapsed ? '' : f.etapas.map(e=>{
      const eDur = e.tasks.reduce((s,t)=>s+Number(t.duracao),0)||1;
      const eDone = e.tasks.filter(t=>t.status==='Concluída').reduce((s,t)=>s+Number(t.duracao),0);
      const ePct = Math.round(eDone/eDur*100);
      const eKey = f.nome+'|'+e.nome;
      const eCollapsed = STATE.collapsedEtapas.has(eKey);
      const rowsHtml = eCollapsed ? '' : e.tasks.map(t=>{
        const dev = taskDeviationDays(t);
        const devClass = dev>0 ? 'crit' : 'ok';
        const devLabel = t.status==='Concluída' ? (dev>0?`+${dev}d`:'no prazo') : (taskIsOverdue(t)?`${dev}d atraso`:'—');
        return `
        <div class="row-atv ${t.status==='Concluída'?'done':''}">
          <input type="checkbox" class="chk" ${t.status==='Concluída'?'checked':''} ${STATE.readOnly?'disabled':''} onchange="toggleTaskDone('${t.id}')">
          <div class="nome" title="${escapeHtml(t.descricao||'')}">
            <b>${escapeHtml(t.nome)}</b>
            <span class="sub">${escapeHtml(t.descricao||'')}</span>
          </div>
          <div class="dates">${t.duracao}d</div>
          <div class="dates">${fmtDate(t.inicioPlan)} → ${fmtDate(t.fimPlan)}</div>
          <select class="status-select" ${STATE.readOnly?'disabled':''} onchange="setTaskStatus('${t.id}', this.value)">
            ${['Não iniciado','Em andamento','Concluída','Bloqueada'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <div class="dev-cell ${devClass}">${devLabel}</div>
        </div>`;
      }).join('');
      return `
        <div class="row-etapa ${eCollapsed?'collapsed':''}" onclick="toggleEtapa('${eKey.replace(/'/g,"\\'")}')">
          <span class="chev">▾</span><span style="flex:1">${escapeHtml(e.nome)}</span>
          <span class="mono" style="font-size:11px;">${e.tasks.length} atividade(s)</span>
          <div class="bar-track"><div class="bar-fill" style="width:${ePct}%"></div></div>
        </div>
        ${rowsHtml}`;
    }).join('');
    return `
      <div class="row-fase ${fCollapsed?'collapsed':''}" onclick="toggleFase('${f.nome.replace(/'/g,"\\'")}')">
        <span class="chev">▾</span><span style="flex:1">${escapeHtml(f.nome)}</span>
        <span class="mono" style="font-size:11px;color:var(--text-dim)">${fPct}%</span>
        <div class="bar-track"><div class="bar-fill" style="width:${fPct}%"></div></div>
      </div>
      ${etapasHtml}`;
  }).join('') || `<div class="empty-state"><div class="big">—</div>Nenhuma atividade encontrada.</div>`;

  return `
    <div class="list-toolbar">
      <input class="search" placeholder="Buscar atividade ou etapa..." value="${STATE.listSearch}" oninput="STATE.listSearch=this.value; mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId))">
      <select class="filter" onchange="STATE.listStatusFilter=this.value; mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId))">
        <option value="all">Todos os status</option>
        <option>Não iniciado</option><option>Em andamento</option><option>Concluída</option><option>Bloqueada</option>
      </select>
      ${STATE.readOnly?'':`<button class="btn primary" onclick="openModal('modalAtividade')">+ Nova Tarefa</button>`}
    </div>
    <div class="table-wrap">
      <div class="col-head"><span></span><span>Atividade</span><span>Duração</span><span>Datas</span><span>Status</span><span style="text-align:right">Desvio</span></div>
      ${body}
    </div>
  `;
}
function toggleFase(nome){ STATE.collapsedFases.has(nome) ? STATE.collapsedFases.delete(nome) : STATE.collapsedFases.add(nome); mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId)); }
function toggleEtapa(key){ STATE.collapsedEtapas.has(key) ? STATE.collapsedEtapas.delete(key) : STATE.collapsedEtapas.add(key); mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId)); }

function toggleTaskDone(id){
  const t = STATE.tasks.find(t=>t.id===id);
  if(!t) return;
  if(t.status==='Concluída'){ t.status='Não iniciado'; t.fimReal=null; t.progresso=0; }
  else { t.status='Concluída'; t.fimReal = todayISO(); t.progresso=100; }
  persist('updateTask', t);
  mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId));
}
function setTaskStatus(id, status){
  const t = STATE.tasks.find(t=>t.id===id);
  if(!t) return;
  t.status = status;
  if(status==='Concluída'){ t.fimReal = todayISO(); t.progresso=100; }
  else { t.fimReal = null; if(status==='Não iniciado') t.progresso=0; }
  persist('updateTask', t);
  mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId));
}

/* ======================= RENDER: TIMELINE ======================= */
function renderTimeline(p,m){
  if(!m.inicioPlan || !m.fimPlan){
    return `<div class="empty-state"><div class="big">—</div>Sem atividades para exibir na timeline.</div>`;
  }
  const start = new Date(m.inicioPlan+'T00:00:00');
  const end = new Date(m.fimPlan+'T00:00:00');
  const totalDays = Math.max(daysBetween(m.inicioPlan,m.fimPlan),1);
  const hoje = new Date(todayISO()+'T00:00:00');
  const todayPct = Math.min(Math.max((hoje-start)/(end-start)*100,0),100);

  // month headers
  const months = [];
  let cur = new Date(start.getFullYear(), start.getMonth(), 1);
  while(cur <= end){
    months.push(new Date(cur));
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }
  const monthHeader = months.map(d=>`<div class="tl-month">${d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})}</div>`).join('');

  // group fase > etapa (aggregate)
  const fases = [];
  m.tasks.forEach(t=>{
    let f = fases.find(f=>f.nome===t.fase);
    if(!f){ f={nome:t.fase, tasks:[], etapas:[]}; fases.push(f); }
    f.tasks.push(t);
    let e = f.etapas.find(e=>e.nome===t.etapa);
    if(!e){ e={nome:t.etapa, tasks:[]}; f.etapas.push(e); }
    e.tasks.push(t);
  });

  function barFor(tasks, isFase){
    const s = tasks.reduce((m,t)=>t.inicioPlan<m?t.inicioPlan:m, tasks[0].inicioPlan);
    const e = tasks.reduce((m,t)=>t.fimPlan>m?t.fimPlan:m, tasks[0].fimPlan);
    const leftPct = daysBetween(m0(start), new Date(s+'T00:00:00'))/totalDays*100;
    const widthPct = Math.max(daysBetween(s,e)/totalDays*100, 0.6);
    const dur = tasks.reduce((a,t)=>a+Number(t.duracao),0)||1;
    const done = tasks.filter(t=>t.status==='Concluída').reduce((a,t)=>a+Number(t.duracao),0);
    const pct = Math.round(done/dur*100);
    return `<div class="tl-bar ${isFase?'fase':''}" style="left:${leftPct}%;width:${widthPct}%;">
      <div class="fill" style="width:${pct}%"></div>
    </div>`;
  }
  function m0(d){ return d.toISOString().slice(0,10); }

  const rows = fases.map(f=>{
    const fRow = `<div class="tl-row fase"><div class="tl-label">${escapeHtml(f.nome)}</div><div class="tl-track">${barFor(f.tasks,true)}</div></div>`;
    const eRows = f.etapas.map(e=>`<div class="tl-row"><div class="tl-label">${escapeHtml(e.nome)}</div><div class="tl-track">${barFor(e.tasks,false)}</div></div>`).join('');
    return fRow + eRows;
  }).join('');

  return `
    <div class="tl-wrap">
      <div class="tl-scroll">
        <div class="tl-grid">
          <div class="tl-header"><div class="tl-label" style="position:sticky;left:0;background:var(--panel-2);"></div>${monthHeader}</div>
          <div style="position:relative;">
            <div class="tl-today" style="left:calc(230px + (100% - 230px) * ${todayPct/100});"></div>
            ${rows}
          </div>
        </div>
      </div>
    </div>
  `;
}

  persist('addProject', p);
  closeModal('modalProjeto');
  ['npNome','npDesc','npSetor','npResp','npInicio','npFim'].forEach(id=>document.getElementById(id).value='');
  openProject(p.id);
}

function submitNovaAtividade(){
  const nome = document.getElementById('naNome').value.trim();
  const fase = document.getElementById('naFase').value.trim();
  const etapa = document.getElementById('naEtapa').value.trim();
  if(!nome || !fase || !etapa){ alert('Preencha fase, etapa e nome da atividade.'); return; }
  const inicio = document.getElementById('naInicio').value || todayISO();
  const duracao = Number(document.getElementById('naDuracao').value || 1);
  const fim = new Date(new Date(inicio+'T00:00:00').getTime() + duracao*86400000).toISOString().slice(0,10);
  const t = {
    id: uid('t'),
    projectId: STATE.currentProjectId,
    fase, etapa, nome,
    descricao: document.getElementById('naDesc').value.trim(),
    duracao,
    deps: [],
    tipoDep: 'Término-Início (FS)',
    resultado: document.getElementById('naResultado').value.trim(),
    inicioPlan: inicio, fimPlan: fim,
    responsavel: document.getElementById('naResp').value.trim(),
    status: 'Não iniciado', progresso: 0
  };
  STATE.tasks.push(t);
  persist('addTask', t);
  closeModal('modalAtividade');
  ['naFase','naEtapa','naNome','naDesc','naResultado','naResp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('naDuracao').value = 1;
  mountProjectTab(STATE.projects.find(p=>p.id===STATE.currentProjectId));
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadData();
</script>
